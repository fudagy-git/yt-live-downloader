name: Build Windows EXE & macOS DMG

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp pyinstaller

      - name: Build EXE
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "YTLiveDownloader" `
            --hidden-import yt_dlp `
            --hidden-import yt_dlp.utils `
            --hidden-import yt_dlp.extractor `
            --collect-all yt_dlp `
            --clean `
            --noconfirm `
            yt_live_downloader.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTLiveDownloader-Windows
          path: dist/YTLiveDownloader.exe
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp pyinstaller
          # tkinter는 python.org 빌드에 내장되어 있음
          python3 -c "import tkinter; print('tkinter OK')"

      - name: Build macOS .app bundle
        run: |
          # --onedir + --windowed = 올바른 .app 번들 생성
          pyinstaller \
            --onedir \
            --windowed \
            --name "YTLiveDownloader" \
            --hidden-import yt_dlp \
            --hidden-import yt_dlp.utils \
            --hidden-import yt_dlp.extractor \
            --hidden-import tkinter \
            --hidden-import tkinter.ttk \
            --hidden-import tkinter.filedialog \
            --hidden-import tkinter.messagebox \
            --hidden-import tkinter.scrolledtext \
            --collect-all yt_dlp \
            --clean \
            --noconfirm \
            yt_live_downloader.py

          # .app 번들 확인
          ls -la dist/
          ls -la "dist/YTLiveDownloader.app/Contents/MacOS/" || true

      - name: Create DMG with Applications symlink
        run: |
          # DMG 스테이징 폴더
          mkdir -p dmg_staging
          cp -r "dist/YTLiveDownloader.app" dmg_staging/
          # Applications 폴더 심볼릭 링크 (드래그 앤 드롭 설치용)
          ln -s /Applications dmg_staging/Applications

          # hdiutil로 정식 DMG 생성
          hdiutil create \
            -volname "YTLiveDownloader" \
            -srcfolder dmg_staging \
            -ov \
            -format UDZO \
            -imagekey zlib-level=9 \
            YTLiveDownloader.dmg

          ls -lh YTLiveDownloader.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTLiveDownloader-macOS
          path: YTLiveDownloader.dmg
          retention-days: 7
